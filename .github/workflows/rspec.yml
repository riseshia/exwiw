name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - 'head'
          - '4.0'
          - '3.4'
          - '3.3'
    env:
      CI: '1'
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      MONGO_HOST: 127.0.0.1
      MONGO_PORT: 27017

    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: exwiw_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: exwiw_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client-17
        # The insert-output snapshot spec shells out to pg_dump, which enforces
        # a strict major-version match with the server (postgres:17 here).
        # ubuntu-latest's default pg_dump is older than 17, so install pgdg's pg17 client.
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - run: bundle install

      - run: bundle exec rspec
